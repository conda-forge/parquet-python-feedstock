{% set name = "parquet-python" %}
{% set version = "1.3.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/parquet/parquet-{{ version }}.tar.gz
  sha256: fb1c90768c1b9159d4d6a9b3112ea8107b0b46d7491c5ac452ba7350f333bf0a

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps -vv
  entry_points:
    - parquet = parquet.__main__:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - thriftpy2

test:
  requires:
    - python {{ python_min }}
  imports:
    - parquet

about:
  home: https://github.com/jcrobak/parquet-python
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: Python implementation of the parquet columnar file format.
  dev_url: https://github.com/jcrobak/parquet-python

extra:
  recipe-maintainers:
    - timkpaine
